services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_local_password
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - atlas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  atlas_postgres_data: